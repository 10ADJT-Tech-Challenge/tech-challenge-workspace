server:
  port: 8081


spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USER:auth}
    password: ${DB_PASS:auth}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    issuer: ${JWT_ISSUER:tech-challenge-auth}
    secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+}
    expiration-seconds: ${JWT_EXP_SECONDS:3600}