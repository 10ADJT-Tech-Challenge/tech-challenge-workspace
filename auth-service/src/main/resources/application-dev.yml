server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/postgres
    user: postgres
    password: postgres
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

jwt:
  issuer: tech-challenge-auth
  secret: dev-secret-very-long-key-123456789
  exp-seconds: 3600

app:
  jwt:
    issuer: ${JWT_ISSUER:tech-challenge-auth}
    secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+}
    expiration-seconds: ${JWT_EXP_SECONDS:3600}
  admin:
    bootstrap-secret: admin123