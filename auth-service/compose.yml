services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build: ./auth-service
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: auth
      DB_PASS: auth
      JWT_ISSUER: tech-challenge-auth
      JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32+"
      JWT_EXP_SECONDS: 3600
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy