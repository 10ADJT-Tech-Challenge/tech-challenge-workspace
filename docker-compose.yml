services:
  # Serviço do Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432" # Expõe a porta do Postgres para o seu PC
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql/data # Persiste os dados do banco
    healthcheck: # Verifica se o banco de dados está pronto para conexões
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      retries: 10

  # Serviço da Aplicação Spring
  app:
    build: ./chef-manager-api # Constrói a imagem a partir do Dockerfile no diretório atual
    container_name: chef-manager-api
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

# Serviço banco de dados PostgreSQL para o SonarQube
  sonar-db:
    image: postgres:16-alpine
    container_name: sonar_db
    environment:
      POSTGRES_USER: ${DB_SONAR_USER}
      POSTGRES_PASSWORD: ${DB_SONAR_PASSWORD}
      POSTGRES_DB: ${DB_SONAR_NAME}
    networks:
      - app-network
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck: # Verifica se o banco de dados está pronto para conexões
      test: [ "CMD-SHELL", "pg_isready -U ${DB_SONAR_USER} -d ${DB_SONAR_NAME}" ]
      interval: 5s
      retries: 5

# Serviço do SonarQube
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/${DB_SONAR_NAME}
      - SONAR_JDBC_USERNAME=${DB_SONAR_USER}
      - SONAR_JDBC_PASSWORD=${DB_SONAR_PASSWORD}
    networks:
      - app-network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

# Serviço do Kafka (O Broker de Mensageria)
  kafka:
    image: apache/kafka:4.0.2-rc3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1                                                                                   # ID único do nó no cluster Kafka
      KAFKA_PROCESS_ROLES: broker,controller                                                             # Este processo atua como broker (mensagens) e controller (metadados do cluster)

      KAFKA_LISTENERS: CONTROLLER://kafka:9093,INTERNAL://kafka:29092,EXTERNAL://kafka:9092              # Interfaces e portas onde o Kafka escuta conexões
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://kafka:9092                           # Endereços que o Kafka anuncia para clientes se conectarem
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL                                                         # Listener usado para comunicação entre brokers

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093                                                       # Define os controllers do cluster (nodeId@endereco:porta)
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER                                                        # Listener utilizado para comunicação entre controllers

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT   # Protocolo de segurança usado por cada listener

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1                                                          # Replicação do tópico interno __consumer_offsets (consumer groups)
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1                                                  # Replicação do log interno de transações
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1                                                             # Número mínimo de réplicas em sync para aceitar transações

      KAFKA_CREATE_TOPICS: "pedido.criado:6:1,pagamento.pendente:6:1"                                    # Formato:  topic:partitions:replication
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app-network

  kafka-init-topics:
    container_name: kafka-init-topics
    image: apache/kafka:4.0.2-rc3
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      bash -c "
      echo 'Aguardando Kafka...';
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic pedido.criado --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092;
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic pagamento.pendente --partitions 6 --replication-factor 1 --bootstrap-server kafka:29092;
      "

# Serviço de Pagamentos (Quarkus)
  pagamentos:
    build:
      context: ./chef-payment-service
      dockerfile: src/main/docker/Dockerfile.${QUARKUS_MODE:-jvm}
    container_name: chef-payment-service
    ports:
      - "8082:8080" # O Quarkus roda internamente na 8080, mapeamos para 8082 para não conflitar com a API principal
    environment:
      DB_HOST: pagamentos-db
      DB_NAME: ${DB_PAGAMENTOS_NAME}
      DB_USER: ${DB_PAGAMENTOS_USER}
      DB_PASSWORD: ${DB_PAGAMENTOS_PASSWORD}
      PAGAMENTO_EXTERNO_URL: http://gateway-pagamento:8089
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
    depends_on:
      pagamentos-db:
        condition: service_healthy
      gateway-pagamento:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
    networks:
      - app-network

  # Serviço banco de dados PostgreSQL para o serviço de pagamento
  pagamentos-db:
    image: postgres:16-alpine
    container_name: pagamentos_db
    environment:
      POSTGRES_USER: ${DB_PAGAMENTOS_USER}
      POSTGRES_PASSWORD: ${DB_PAGAMENTOS_PASSWORD}
      POSTGRES_DB: ${DB_PAGAMENTOS_NAME}
    ports:
      - "5433:5432"
    networks:
      - app-network
    volumes:
      - pagamentos-db-data:/var/lib/postgresql/data
    healthcheck: # Verifica se o banco de dados está pronto para conexões
      test: [ "CMD-SHELL", "pg_isready -U ${DB_PAGAMENTOS_USER} -d ${DB_PAGAMENTOS_NAME}" ]
      interval: 5s
      retries: 5

  gateway-pagamento:
    container_name: gateway-pagamento
    image: docker.io/erickemprobr/procpag:latest
    platform: linux/amd64
    ports:
      - "8089:8089"
    networks:
      - app-network

# Serviço de Pedidos
  pedidos:
    build:
      context: ./chef-order-service
    container_name: chef-order-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: pedidos-db
      DB_NAME: ${DB_PEDIDOS_NAME}
      DB_USER: ${DB_PEDIDOS_USER}
      DB_PASSWORD: ${DB_PEDIDOS_PASSWORD}
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
    depends_on:
      pedidos-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
    networks:
      - app-network

# Serviço banco de dados PostgreSQL para o serviço de pedidos
  pedidos-db:
    image: postgres:16-alpine
    container_name: pedidos_db
    environment:
      POSTGRES_USER: ${DB_PEDIDOS_USER}
      POSTGRES_PASSWORD: ${DB_PEDIDOS_PASSWORD}
      POSTGRES_DB: ${DB_PEDIDOS_NAME}
    ports:
      - "5434:5432"
    networks:
      - app-network
    volumes:
      - pedidos-db-data:/var/lib/postgresql/data
    healthcheck: # Verifica se o banco de dados está pronto para conexões
      test: [ "CMD-SHELL", "pg_isready -U ${DB_PEDIDOS_USER} -d ${DB_PEDIDOS_NAME}" ]
      interval: 5s
      retries: 5

# Declaração dos volumes e redes
volumes:
  postgres-data:        # Volume nomeado para persistir os dados
  sonar-db-data:        # Volume nomeado para o banco de dados do SonarQube
  sonarqube_data:       # Volume para dados do SonarQube
  sonarqube_extensions: # Volume para extensões do SonarQube
  sonarqube_logs:       # Volume para logs do SonarQube
  kafka-data:           # Volume para persistir dados do Kafka
  pagamentos-db-data:   # Volume para o banco de dados de pagamentos
  pedidos-db-data:      # Volume para o banco de dados de pedidos

networks:
  app-network: # Rede customizada para os serviços se comunicarem
